spring.application.name=hackthonproject
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/hackthon_db?createDatabaseIfNotExist=true}
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Removing standard naming strategy to allow Hibernate's default snake_case mapping
# spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

app.jwt.secret=${JWT_SECRET:cafechino_pos_system_secret_key_for_jwt_auth_256_bits}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:36000000}
